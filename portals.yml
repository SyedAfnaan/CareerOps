# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.

title_filter:
  positive:
    - "Backend"
    - "Backend Engineer"
    - "Software Engineer"
    - "API"
    - "Integration"
    - "Integration Engineer"
    - "Platform Engineer"
    - ".NET"
    - "C#"
    - "Fullstack"
    - "AI"
    - "ML"
    - "LLM"
    - "Agent"
    - "GenAI"
    - "Automation"

  negative:
    - "Junior"
    - "Intern"
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"

  seniority_boost:
    - "Senior"
    - "Lead"
    - "Staff"

search_queries:
  - name: Ashby — Backend Engineer
    query: 'site:jobs.ashbyhq.com "Backend Engineer" OR "Software Engineer Backend" remote'
    enabled: true

  - name: Ashby — .NET Developer
    query: 'site:jobs.ashbyhq.com ".NET Developer" OR "C# Developer" remote'
    enabled: true

  - name: Ashby — Integration Engineer
    query: 'site:jobs.ashbyhq.com "Integration Engineer" OR "API Integration" remote'
    enabled: true

  - name: Ashby — Platform Engineer
    query: 'site:jobs.ashbyhq.com "Platform Engineer" OR "Infrastructure Engineer" remote'
    enabled: true

  - name: Greenhouse — Backend Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Backend Engineer" OR "API Engineer" remote'
    enabled: true

  - name: Greenhouse — .NET Developer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io ".NET Developer" OR "C# Developer" remote'
    enabled: true

  - name: Greenhouse — Integration Roles
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Integration Engineer" OR "API Integration" remote'
    enabled: true

  - name: Workable — Backend Roles
    query: 'site:apply.workable.com "Backend Engineer" OR "API Engineer" remote'
    enabled: true

  - name: Backend — Remote Europe
    query: 'site:remotive.com OR site:weworkremotely.com "Backend Engineer" OR "Software Engineer" Europe'
    enabled: true

  - name: Python Backend / FastAPI
    query: 'site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com "FastAPI" OR "Python Backend" remote'
    enabled: true

  - name: Applied AI Engineer
    query: 'site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com "AI Engineer" OR "Applied AI" backend OR API remote'
    enabled: true

  - name: LinkedIn — Backend Engineer (KSA/UAE)
    query: 'site:linkedin.com/jobs "Backend Engineer" OR "Software Engineer Backend" Saudi Arabia OR UAE'
    enabled: true

  - name: LinkedIn — .NET Developer (KSA/UAE)
    query: 'site:linkedin.com/jobs ".NET Developer" OR "C# Developer" Saudi Arabia OR UAE'
    enabled: true

  - name: Bayt — Backend / API Roles
    query: 'site:bayt.com "Backend Engineer" OR "API Developer" Saudi Arabia OR UAE'
    enabled: true

  - name: Bayt — .NET Developer
    query: 'site:bayt.com ".NET Developer" OR "C# Developer" Saudi Arabia OR UAE'
    enabled: true

  - name: GulfTalent — Software Engineer
    query: 'site:gulftalent.com "Software Engineer" OR "Backend Developer" Saudi Arabia OR UAE'
    enabled: true

  - name: GulfTalent — Integration / API Roles
    query: 'site:gulftalent.com "Integration Engineer" OR "API Integration" Saudi Arabia OR UAE'
    enabled: true

  - name: Naukrigulf — Backend Roles
    query: 'site:naukrigulf.com "Backend Developer" OR "Software Engineer" Saudi Arabia OR UAE'
    enabled: true

  - name: Naukrigulf — .NET Developer
    query: 'site:naukrigulf.com ".NET Developer" OR "C# Developer" Saudi Arabia OR UAE'
    enabled: true

  - name: Indeed — Backend Engineer (KSA/UAE)
    query: 'site:indeed.com "Backend Engineer" OR "Software Engineer Backend" Saudi Arabia OR UAE'
    enabled: true

  - name: Indeed — .NET / C# Roles
    query: 'site:indeed.com ".NET Developer" OR "C# Developer" Saudi Arabia OR UAE'
    enabled: true

  - name: Wuzzuf / Forasna (Regional Tech Jobs)
    query: 'site:wuzzuf.net OR site:forasna.com "Software Engineer" OR "Backend Developer" Saudi Arabia OR UAE'
    enabled: true

  - name: AngelList (Wellfound) — Startups GCC
    query: 'site:wellfound.com "Backend Engineer" OR "Software Engineer" Saudi Arabia OR UAE'
    enabled: true

  - name: Company Career Pages (Aramco, STC, Careem, Noon)
    query: 'site:careers.aramco.com OR site:careers.stc.com.sa OR site:careers.careem.com OR site:careers.noon.com "Software Engineer"'
    enabled: true

  - name: Government Portals (KSA/UAE)
    query: 'site:jadarat.sa OR site:tdra.gov.ae OR site:uaejobs.ae "Software Engineer" OR "IT Specialist"'
    enabled: true

  - name: Remote + GCC Relocation
    query: 'site:weworkremotely.com OR site:remotive.com "Backend Engineer" relocation UAE OR Saudi Arabia'
    enabled: true

